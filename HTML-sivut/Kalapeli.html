<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metsäpeli</title>
    <link rel="stylesheet" href="../Tyylit/style.css">
    <link rel="stylesheet" href="../Tyylit/stylenav.css">
    <link rel="stylesheet" href="../Tyylit/kalapeli.css">
    <script src="../JS/kalapeli.js" defer></script>
</head>

<body>
    <div>
        <ul id="navbar">
            <li><a href="../HTML-sivut/etusivu.html"><img src="../Kuvat/leaf.png" alt="Etusivu" id="navimg"></a></li>
            <a href="../HTML-sivut/etusivu.html" class="etusivutext">Etusivu</a>

            <li><a href="../HTML-sivut/tulokset.html"><img src="../Kuvat/sun.png" alt="Tulokset" id="navimg"></a></li>
            <a href="../HTML-sivut/tulokset.html" class="tuloksettext">Tulokset</a>

            <li><a href="../HTML-sivut/pelinavigointi.html"><img src="../Kuvat/fish.png" alt="Pelit" id="navimg"></a>
            </li>
            <a href="../HTML-sivut/pelinavigointi.html" class="pelittext">Pelit</a>

            <li><a href="../HTML-sivut/tietoja.html"><img src="../Kuvat/stump.png" alt="Tietoja" id="navimg"></a></li>
            <a href="../HTML-sivut/tietoja.html" class="tietojatext">Tietoja</a>
        </ul>
    </div>

    <main>
        <div class="game-container">
            <img src="../Kuvat/vedenalla.jpg" alt="Kuva veden alta" id="vesi">

            <img src="../Kuvat/perch (1).png" alt="Ahven" id="ahven">


            <div class="drop-zone dz-selka" data-correct="selkäevä" style="top: 35%; left: 58%;"></div>
            <div class="drop-zone dz-pyrsto" data-correct="pyrstöevä" style="top: 49%; left: 23%;"></div>
            <div class="drop-zone dz-pera" data-correct="peräevä" style="top: 62%; left: 35%;"></div>
            <div class="drop-zone dz-vatsa" data-correct="vatsaevä" style="top: 70%; left: 60%;"></div>
            <div class="drop-zone dz-rinta" data-correct="rintaevä" style="top: 57%; left: 66%;"></div>


            <div class="labels-container" id="labels">
                <div class="draggable" draggable="true" id="selkäevä">Selkäevä</div>
                <div class="draggable" draggable="true" id="pyrstöevä">Pyrstöevä</div>
                <div class="draggable" draggable="true" id="peräevä">Peräevä</div>
                <div class="draggable" draggable="true" id="vatsaevä">Vatsaevä</div>
                <div class="draggable" draggable="true" id="rintaevä">Rintaevä</div>
            </div>

            <div class="controls">
                <p>Pisteet: <span id="score">0</span></p>
                <button id="check-btn">Tarkista vastaukset</button>
                <button id="retry">Kokeile uudestaan</button>
            </div>
        </div>
    </main>

    <div class="footer-content">
        <footer>
            <p><strong>Tekijät:</strong> Vertti Ruotsala, Niko Haataja, Matti Komulainen ja Otto Matikainen</p>
            <p>© 2026 Metsäpeli - Lisensoitu <a href="https://creativecommons.org/licenses/by/4.0/deed.fi"
                    target="_blank" rel="License noopener noreferrer"> CC BY 4.0</a> -lisenssillä</p>
        </footer>
    </div>
</body>

</html>
